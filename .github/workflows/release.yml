name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: go run build.go

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/status-line-*.tar.gz \
            dist/status-line-*.zip \
            dist/SHA256SUMS.txt

      - name: Delete assets from older releases
        uses: actions/github-script@v7
        with:
          script: |
            const currentTag = context.payload.release.tag_name;
            const { owner, repo } = context.repo;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const sorted = [...releases].sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at),
            );

            // Keep the last 2 releases so installers don't throw errors if the
            // the latest release is too new.
            const keepTags = new Set([
              currentTag,
              ...sorted.map((r) => r.tag_name).filter((t) => t !== currentTag).slice(0, 2),
            ]);

            for (const release of releases) {
              if (keepTags.has(release.tag_name)) continue;

              const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
                owner,
                repo,
                release_id: release.id,
                per_page: 100,
              });

              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
            }
